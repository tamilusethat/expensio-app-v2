name: Build Expensio APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 ─────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Set up Node.js ─────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 4. Install frontend dependencies ──────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      # ── 5. Install Capacitor packages ─────────────────────────────────────
      - name: Install Capacitor
        working-directory: frontend
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      # ── 6. Build React app ─────────────────────────────────────────────────
      - name: Build React app
        working-directory: frontend
        run: npm run build

      # ── 7. Add Android platform ───────────────────────────────────────────
      - name: Initialize Capacitor and add Android
        working-directory: frontend
        run: |
          npx cap add android || true
          npx cap sync android

      # ── 8. Set up Android SDK ─────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 9. Accept licenses ────────────────────────────────────────────────
      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      # ── 10. Grant Gradle permission ───────────────────────────────────────
      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x gradlew

      # ── 11. Build APK ──────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # ── 12. Upload APK ────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Expensio-debug-APK
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 13. Confirm success ───────────────────────────────────────────────
      - name: Show APK info
        run: |
          APK="frontend/android/app/build/outputs/apk/debug/app-debug.apk"
          echo "✅ APK built: $(du -sh $APK | cut -f1)"
