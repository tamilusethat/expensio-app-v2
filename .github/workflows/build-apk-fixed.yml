name: Build Expensio APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 21 (fixes compileDebugJavaWithJavac error) ────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 3. Node 20 ────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 4. Install dependencies + Capacitor ──────────────────────────────
      - name: Install dependencies
        working-directory: frontend
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      # ── 5. Write capacitor.config.json ────────────────────────────────────
      - name: Write Capacitor config
        working-directory: frontend
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.expensio.app",
            "appName": "Expensio",
            "webDir": "dist",
            "server": {
              "androidScheme": "https"
            }
          }
          EOF

      # ── 6. Build React app ────────────────────────────────────────────────
      - name: Build React app
        working-directory: frontend
        run: npm run build

      # ── 7. Add Android platform ───────────────────────────────────────────
      - name: Add Android platform
        working-directory: frontend
        run: |
          npx cap add android || echo "already added"
          npx cap sync android

      # ── 8. Android SDK ────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 9. Accept licenses ────────────────────────────────────────────────
      - name: Accept SDK licenses
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" || true
          yes | sdkmanager --licenses || true

      # ── 10. Make gradlew executable ───────────────────────────────────────
      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x gradlew

      # ── 11. Build APK ─────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # ── 12. Upload APK ────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Expensio-debug-APK
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 13. Confirm ───────────────────────────────────────────────────────
      - name: Show APK size
        run: |
          echo "✅ APK ready!"
          du -sh frontend/android/app/build/outputs/apk/debug/app-debug.apk
