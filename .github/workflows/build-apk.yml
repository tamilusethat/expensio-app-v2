name: Build Expensio APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ───────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── 3. Install frontend dependencies ───────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      # ── 4. Build React app (dist/) ──────────────────────────────────────────
      - name: Build React app
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5000

      # ── 5. Install Capacitor CLI & Android platform ─────────────────────────
      - name: Install Capacitor
        working-directory: frontend
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      # ── 6. Add Android platform ─────────────────────────────────────────────
      - name: Add Android platform
        working-directory: frontend
        run: |
          npx cap add android || true
          npx cap sync android

      # ── 7. Set up Java 17 ───────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 8. Set up Android SDK ───────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 9. Accept Android SDK licenses ─────────────────────────────────────
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      # ── 10. Grant Gradle execute permission ─────────────────────────────────
      - name: Make Gradle executable
        working-directory: frontend/android
        run: chmod +x gradlew

      # ── 11. Build debug APK ─────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # ── 12. Upload APK as artifact ──────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Expensio-debug-APK
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 13. Show APK info ───────────────────────────────────────────────────
      - name: Show APK size
        run: |
          APK_PATH="frontend/android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK built successfully!"
            echo "📦 Size: $(du -sh $APK_PATH | cut -f1)"
          else
            echo "❌ APK not found"
            exit 1
          fi
