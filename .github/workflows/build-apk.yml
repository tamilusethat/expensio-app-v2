name: Build Expensio APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: |
          npm install
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest

      - name: Write Capacitor config
        working-directory: frontend
        run: |
          printf '{\n  "appId": "com.expensio.app",\n  "appName": "Expensio",\n  "webDir": "dist",\n  "android": {\n    "allowMixedContent": true,\n    "backgroundColor": "#f8f9fc"\n  }\n}\n' > capacitor.config.json

      - name: Fix Vite base path
        working-directory: frontend
        run: |
          cat > vite.config.js << 'EOF'
          import { defineConfig } from 'vite'
          import react from '@vitejs/plugin-react'
          export default defineConfig({
            base: './',
            plugins: [react()],
            build: { outDir: 'dist', assetsDir: 'assets' },
            server: {
              port: 5173,
              proxy: { '/api': { target: 'http://localhost:5000', changeOrigin: true } }
            }
          })
          EOF

      - name: Build React app
        working-directory: frontend
        run: npm run build

      - name: Add Android platform
        working-directory: frontend
        run: |
          npx cap add android || echo "already added"
          npx cap sync android

      - name: Fix Kotlin conflict
        working-directory: frontend/android
        run: |
          cat >> build.gradle << 'EOF'

          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force "org.jetbrains.kotlin:kotlin-stdlib:1.9.10"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.10"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.10"
                  }
              }
          }
          EOF

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" || true
          yes | sdkmanager --licenses || true

      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Expensio-debug-APK
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show APK size
        run: |
          echo "APK ready!"
          du -sh frontend/android/app/build/outputs/apk/debug/app-debug.apk
